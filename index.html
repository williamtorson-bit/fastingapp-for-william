  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0A0C18;
      --surf:   #111527;
      --card:   #161B30;
      --card2:  #1C2238;
      --bdr:    #262E4A;
      --teal:   #00E5B0;
      --amber:  #FFAD33;
      --coral:  #FF5E7A;
      --purple: #9D7BFF;
      --blue:   #4DA8FF;
      --pink:   #F472B6;
      --green:  #4ADE80;
      --text:   #F2F5FF;
      --muted:  #93A0C2;
      --fd: 'Space Grotesk', sans-serif;
      --fb: 'Inter', sans-serif;
    }
    /* ───── LIGHT THEME ───── */
    html[data-theme="light"] {
      --bg:     #F7F5F0;
      --surf:   #FFFFFF;
      --card:   #FFFFFF;
      --card2:  #FDFBF7;
      --bdr:    #E5DfD2;
      --teal:   #009A78;
      --amber:  #D98200;
      --coral:  #E03B58;
      --purple: #7456D9;
      --blue:   #1F74D4;
      --pink:   #D9398F;
      --green:  #1FA055;
      --text:   #1C1B18;
      --muted:  #6E6753;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fb);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      transition: background .35s ease, color .35s ease;
    }
    body {
      background-image:
        radial-gradient(ellipse 90% 40% at 50% -5%, rgba(0,229,176,.07), transparent 60%),
        radial-gradient(ellipse 70% 35% at 85% 100%, rgba(157,123,255,.06), transparent 60%);
      background-attachment: fixed;
    }
    html[data-theme="light"] body {
      background-image:
        radial-gradient(ellipse 90% 40% at 50% -5%, rgba(0,163,126,.08), transparent 60%),
        radial-gradient(ellipse 70% 35% at 85% 100%, rgba(124,92,224,.06), transparent 60%);
    }
    html[data-theme="light"] .orb { opacity: .14; }
    html[data-theme="light"] .card { box-shadow: 0 6px 28px rgba(60,45,20,.09); }
    html[data-theme="light"] .btn-add { color: #fff; box-shadow: 0 6px 26px rgba(0,163,126,.35); }
    html[data-theme="light"] .btn-save { color: #fff; }
    html[data-theme="light"] .modal { box-shadow: 0 -10px 50px rgba(60,45,20,.15); }
    html[data-theme="light"] .overlay { background: rgba(50,42,28,.4); }
    html[data-theme="light"] .field input { color-scheme: light; }

    /* ───── THEME TOGGLE ───── */
    .theme-toggle {
      position: fixed; top: 14px; right: 14px; z-index: 200;
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--bdr);
      color: var(--text); cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      transition: transform .15s;
    }
    .theme-toggle:active { transform: scale(.88) rotate(20deg); }
    html[data-theme="light"] .theme-toggle { box-shadow: 0 4px 16px rgba(60,45,20,.12); }

    /* ───── AMBIENT BACKGROUND ───── */
    .orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb  { position: absolute; border-radius: 50%; filter: blur(110px); opacity: .1; animation: drift 26s ease-in-out infinite; }
    .o1 { width: 460px; height: 460px; background: var(--teal);   top: -150px; left: -120px; }
    .o2 { width: 380px; height: 380px; background: var(--purple); top: 35%; right: -100px; animation-delay: -9s; }
    .o3 { width: 340px; height: 340px; background: var(--pink);   bottom: -100px; left: 20%; animation-delay: -18s; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(26px,-18px) scale(1.05); }
      70%      { transform: translate(-18px,22px) scale(.96); }
    }

    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 10px 14px 40px; }

    /* ───── RAINBOW LOGO HEADER ───── */
    .header { text-align: center; padding: 14px 0 2px; }
    .header-eye {
      font-family: var(--fd); font-size: .62rem; letter-spacing: .26em;
      text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 4px;
    }
    .logo {
      font-family: var(--fd);
      font-size: clamp(1.35rem, 6.5vw, 1.75rem); font-weight: 700; letter-spacing: -.02em; line-height: 1.05;
      white-space: nowrap;
      background: linear-gradient(115deg, #FF6B6B 0%, #FFB347 18%, #FFE066 34%, #4ADE80 50%, #00E5B0 62%, #5EB1FF 76%, #A78BFA 88%, #F472B6 100%);
      background-size: 250% 250%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: rainbowShift 7s ease-in-out infinite;
    }
    @keyframes rainbowShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    .logo-flame { font-size: 1.2rem; display: block; margin-bottom: 1px; animation: flicker 2.4s ease-in-out infinite; }
    @keyframes flicker {
      0%,100% { transform: scale(1) rotate(-2deg);  filter: drop-shadow(0 0 10px rgba(255,179,71,.55)); }
      50%      { transform: scale(1.1) rotate(2deg); filter: drop-shadow(0 0 18px rgba(255,107,107,.75)); }
    }
    .header-sub { color: var(--muted); font-size: .72rem; margin-top: 4px; letter-spacing: .04em; }

    /* ───── BIG RAINBOW LIVE TIMER ───── */
    .timer-wrap {
      margin: 12px 12px 0;
      border-radius: 16px;
      padding: 11px 10px 10px;
      text-align: center;
      position: relative;
      border: 2px solid transparent;
      background:
        linear-gradient(var(--surf), var(--surf)) padding-box,
        linear-gradient(115deg, #FF6B6B, #FFB347, #FFE066, #4ADE80, #00E5B0, #5EB1FF, #A78BFA, #F472B6) border-box;
      background-size: 100% 100%, 300% 300%;
      animation: rainbowShift 5s linear infinite;
    }
    .timer-lbl {
      font-size: .66rem; text-transform: uppercase; letter-spacing: .14em;
      color: var(--muted); font-weight: 800; margin-bottom: 7px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    /* flashing multi-coloured lights */
    .lights { display: flex; justify-content: center; gap: 7px; margin-bottom: 7px; }
    .light {
      width: 9px; height: 9px; border-radius: 50%;
      animation: lightBlink 1.6s ease-in-out infinite;
    }
    .light:nth-child(1) { background:#FF6B6B; box-shadow:0 0 8px #FF6B6B; animation-delay:0s; }
    .light:nth-child(2) { background:#FFB347; box-shadow:0 0 8px #FFB347; animation-delay:.2s; }
    .light:nth-child(3) { background:#FFE066; box-shadow:0 0 8px #FFE066; animation-delay:.4s; }
    .light:nth-child(4) { background:#4ADE80; box-shadow:0 0 8px #4ADE80; animation-delay:.6s; }
    .light:nth-child(5) { background:#00E5B0; box-shadow:0 0 8px #00E5B0; animation-delay:.8s; }
    .light:nth-child(6) { background:#5EB1FF; box-shadow:0 0 8px #5EB1FF; animation-delay:1s; }
    .light:nth-child(7) { background:#A78BFA; box-shadow:0 0 8px #A78BFA; animation-delay:1.2s; }
    .light:nth-child(8) { background:#F472B6; box-shadow:0 0 8px #F472B6; animation-delay:1.4s; }
    @keyframes lightBlink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .25; transform: scale(.7); }
    }
    .pulse { width: 7px; height: 7px; border-radius: 50%; display: inline-block; animation: blink 1.2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes blink { 0%,100%{opacity:1; box-shadow: 0 0 8px currentColor;} 50%{opacity:.25;} }

    .timer-digits { display: grid; grid-template-columns: 1fr 10px 1fr 10px 1fr 10px 1fr; align-items: start; }
    .td { display: flex; flex-direction: column; align-items: center; }
    .td-num {
      font-family: var(--fd); font-weight: 700;
      font-size: clamp(1.55rem, 7.5vw, 2.1rem);
      line-height: 1; background: var(--card); border: 1px solid var(--bdr);
      border-radius: 11px; padding: 9px 2px; width: 100%; text-align: center;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 18px currentColor;
    }
    html[data-theme="light"] .td-num { text-shadow: none; }
    .td-lbl { font-size: .6rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-top: 5px; font-weight: 800; }
    .td-sep { font-family: var(--fd); font-weight: 700; font-size: 1.2rem; color: var(--bdr); text-align: center; padding-top: 10px; }
    .timer-sub { font-size: .68rem; color: var(--muted); margin-top: 6px; font-weight: 600; }

    /* ───── BIG BOLD CURRENT STAGE HERO ───── */
    .stage-hero {
      display: flex; align-items: center; gap: 12px;
      margin: 10px 12px 0;
      border-radius: 16px; padding: 11px 13px;
      border: 1px solid var(--bdr);
    }
    .stage-hero-emoji {
      font-size: 1.8rem; line-height: 1; flex-shrink: 0;
      animation: flicker 2.6s ease-in-out infinite;
    }
    .stage-hero-meta { flex: 1; min-width: 0; }
    .stage-hero-kicker { font-size: .6rem; text-transform: uppercase; letter-spacing: .16em; font-weight: 800; margin-bottom: 3px; }
    .stage-hero-name {
      font-family: var(--fd); font-size: 1.18rem; font-weight: 700; line-height: 1.15;
    }
    .stage-hero-next { font-size: .74rem; font-weight: 600; color: var(--text); opacity: .75; margin-top: 5px; }
    .stage-hero-next b { opacity: 1; }

    /* ───── CONFETTI ───── */
    .card { position: relative; }
    .confetti-piece {
      position: absolute; top: -12px; width: 8px; height: 13px;
      border-radius: 2px; opacity: 0; pointer-events: none; z-index: 5;
      animation: confFall var(--dur,2.6s) ease-in var(--delay,0s) forwards;
    }
    @keyframes confFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(420px) rotate(540deg); }
    }

    /* ───── ADD BUTTON ───── */
    .add-wrap { display: flex; justify-content: center; padding: 12px 0 10px; }
    .btn-add {
      position: relative;
      display: flex; align-items: center; gap: 9px;
      background: linear-gradient(115deg, #FF6B6B, #FFB347, #00E5B0, #5EB1FF, #A78BFA);
      background-size: 300% 300%;
      animation: rainbowShift 6s ease-in-out infinite;
      border: none; border-radius: 999px;
      color: #06080e; font-family: var(--fb); font-weight: 800; font-size: .95rem;
      padding: 12px 28px; cursor: pointer;
      box-shadow: 0 6px 30px rgba(0,229,176,.3);
      transition: transform .15s;
    }
    .btn-add:active { transform: scale(.95); }
    .btn-add svg { width: 16px; height: 16px; stroke-width: 3.5; }

    /* ───── ACTIVITY CARD ───── */
    .list { display: flex; flex-direction: column; gap: 18px; }

    .card {
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid var(--bdr);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
    }
    .card-accent { height: 4px; background-size: 200% 100%; animation: rainbowShift 5s linear infinite; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; padding: 12px 13px 0; gap: 8px; }
    .card-left { display: flex; align-items: flex-start; gap: 12px; min-width: 0; }
    .card-emoji {
      font-size: 1.5rem; line-height: 1; flex-shrink: 0;
      width: 46px; height: 46px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surf); border: 1px solid var(--bdr);
    }
    .card-name { font-family: var(--fd); font-size: 1.15rem; font-weight: 700; line-height: 1.2; word-break: break-word; }
    .card-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      padding: 4px 11px; border-radius: 999px; margin-top: 6px;
    }
    .bdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .card-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .ibtn {
      width: 36px; height: 36px; border-radius: 11px;
      background: var(--surf); border: 1px solid var(--bdr);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s;
    }
    .ibtn:active { transform: scale(.88); }
    .ibtn svg { width: 14px; height: 14px; }

    /* ───── PROGRESS RING (sits inside stage hero) ───── */
    .ring-wrap { position: relative; width: 74px; height: 74px; flex-shrink: 0; }
    .ring-svg  { transform: rotate(-90deg); display: block; width: 74px; height: 74px; }
    .ring-track { fill: none; stroke: var(--surf); stroke-width: 8; }
    .ring-prog  { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .ring-mid {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-pct { font-family: var(--fd); font-size: 1rem; font-weight: 700; line-height: 1; }
    .ring-cap { font-size: .52rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-top: 2px; font-weight: 700; }

    /* ───── DATE BOXES ───── */
    .dates-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 12px 0; }
    .dt-box {
      background: var(--surf); border: 1px solid var(--bdr);
      border-radius: 13px; padding: 8px 11px; position: relative; overflow: hidden;
    }
    .dt-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2.5px; }
    .dt-box.s::before { background: linear-gradient(90deg, var(--teal), var(--blue)); }
    .dt-box.e::before { background: linear-gradient(90deg, var(--coral), var(--amber)); }
    .dt-lbl  { font-size: .58rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
    .dt-date { font-family: var(--fd); font-size: .92rem; font-weight: 700; }
    .dt-time { font-size: .76rem; font-weight: 700; margin-top: 3px; font-variant-numeric: tabular-nums; }

    /* ───── STATS STRIP (one slim line) ───── */
    .stats-strip {
      display: flex; align-items: center; justify-content: space-around;
      margin: 8px 12px 0;
      background: var(--surf); border: 1px solid var(--bdr); border-radius: 13px;
      padding: 8px 10px;
    }
    .ss-item { text-align: center; }
    .ss-val { font-family: var(--fd); font-size: 1.15rem; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .ss-lbl { font-size: .54rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-top: 3px; font-weight: 700; }
    .ss-div { width: 1px; height: 24px; background: var(--bdr); }

    /* ───── CURRENT STAGE PANEL ───── */
    .stage-panel {
      margin: 14px 18px 0;
      border-radius: 16px; padding: 15px 16px;
      border: 1px solid var(--bdr);
      position: relative; overflow: hidden;
    }
    .stage-kicker { font-size: .6rem; text-transform: uppercase; letter-spacing: .14em; font-weight: 800; margin-bottom: 5px; }
    .stage-name   { font-family: var(--fd); font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .stage-desc   { font-size: .78rem; color: var(--muted); line-height: 1.65; margin-top: 7px; }
    .stage-desc b { color: var(--text); }
    .stage-next   { font-size: .8rem; font-weight: 500; margin-top: 9px; padding-top: 9px; border-top: 1px dashed var(--bdr); color: var(--text); opacity: .8; }
    .stage-next b { color: var(--text); }

    /* ───── STAGE CAROUSEL (auto-playing "moving picture") ───── */
    .journey { margin: 10px 12px 13px; }
    .journey-title {
      font-size: .62rem; text-transform: uppercase; letter-spacing: .14em;
      color: var(--muted); font-weight: 800; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .journey-hint { font-size: .56rem; letter-spacing: .04em; text-transform: none; font-weight: 500; opacity: .7; }

    .carousel {
      position: relative; overflow: hidden;
      border: 1px solid var(--bdr); border-radius: 16px;
      background: var(--surf);
      touch-action: pan-y;
    }
    .car-track {
      display: flex;
      transition: transform 1.4s cubic-bezier(.25,.8,.25,1);
      will-change: transform;
    }
    .car-slide {
      flex: 0 0 100%; min-width: 100%;
      padding: 11px 13px 9px;
    }
    .car-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .car-dot-icon {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1.05rem;
      border: 2px solid var(--bdr); background: var(--card);
    }
    .car-slide.hit .car-dot-icon { border-color: var(--teal); background: rgba(0,229,176,.12); box-shadow: 0 0 12px rgba(0,229,176,.3); }
    .car-slide.now .car-dot-icon { animation: nowPulse 1.8s ease-in-out infinite; }
    @keyframes nowPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,229,176,.45); }
      50%      { box-shadow: 0 0 0 7px rgba(0,229,176,0); }
    }
    .car-meta { flex: 1; min-width: 0; }
    .car-name { font-family: var(--fd); font-size: 1.02rem; font-weight: 700; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .car-when { font-size: .7rem; color: var(--muted); font-weight: 700; margin-top: 2px; }
    .tag {
      font-size: .56rem; font-weight: 800; text-transform: uppercase; letter-spacing: .07em;
      padding: 2px 8px; border-radius: 999px;
    }
    .tag-hit { background: rgba(0,229,176,.14); color: var(--teal); }
    .tag-now { background: rgba(255,179,71,.16); color: var(--amber); }
    .car-desc {
      font-size: .8rem; color: var(--text); opacity: .82;
      font-weight: 500; line-height: 1.6;
      min-height: 60px;
    }
    .car-desc b { color: var(--text); opacity: 1; font-weight: 700; }

    /* dots + inline nav arrows (no overlay over the text) */
    .car-nav {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 0 14px 9px;
    }
    .car-dot {
      width: 7px; height: 7px; border-radius: 999px;
      background: var(--bdr); cursor: pointer;
      transition: all .3s;
    }
    .car-dot.on { width: 20px; background: var(--teal); }
    .car-dot.passed { background: rgba(0,229,176,.45); }
    .car-arrow {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--bdr);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .car-arrow svg { width: 13px; height: 13px; }
    .car-arrow.prev { margin-right: 5px; }
    .car-arrow.next { margin-left: 5px; }
    .car-progress {
      position: absolute; bottom: 0; left: 0; height: 2.5px;
      background: linear-gradient(90deg, var(--teal), var(--blue));
      width: 0%; border-radius: 999px;
    }
    .car-progress.animating { animation: carProg linear forwards; }
    @keyframes carProg { from { width: 0%; } to { width: 100%; } }

    /* ───── EMPTY STATE ───── */
    .empty { text-align: center; padding: 26px 6px 20px; }
    .empty-icon { font-size: 3.2rem; margin-bottom: 12px; animation: flicker 2.6s ease-in-out infinite; display: inline-block; }
    .empty h2 {
      font-family: var(--fd); font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(115deg, #FF6B6B, #FFB347, #00E5B0, #5EB1FF, #A78BFA);
      background-size: 250% 250%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: rainbowShift 7s ease-in-out infinite;
    }
    .empty p  { color: var(--muted); font-size: .88rem; line-height: 1.65; max-width: 320px; margin: 0 auto 20px; }
    .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
    .feat {
      border-radius: 16px; padding: 14px 13px;
      border: 1px solid var(--bdr);
    }
    .feat-icon { font-size: 1.4rem; margin-bottom: 7px; }
    .feat-t { font-family: var(--fd); font-size: .82rem; font-weight: 700; margin-bottom: 4px; }
    .feat-d { font-size: .7rem; color: var(--muted); line-height: 1.55; font-weight: 500; }

    /* ───── MODAL ───── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(2,4,10,.86); backdrop-filter: blur(14px);
      align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--bdr);
      border-radius: 26px 26px 0 0;
      padding: 20px 20px 44px;
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      animation: sheetUp .28s cubic-bezier(.3,1.1,.4,1);
    }
    @keyframes sheetUp { from { transform: translateY(70px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .drag-bar { width: 42px; height: 4px; background: var(--bdr); border-radius: 2px; margin: 0 auto 18px; }
    .modal h2 { font-family: var(--fd); font-size: 1.35rem; font-weight: 700; margin-bottom: 4px; }
    .modal-sub { color: var(--muted); font-size: .8rem; margin-bottom: 20px; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: .66rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px;
    }
    .field input {
      width: 100%; background: var(--surf); border: 1px solid var(--bdr);
      border-radius: 12px; color: var(--text); font-family: var(--fb); font-size: 1rem;
      padding: 13px 15px; outline: none; transition: border-color .2s, box-shadow .2s;
      color-scheme: dark; -webkit-appearance: none; appearance: none;
    }
    .field input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,229,176,.12); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

    .emoji-row { display: flex; flex-wrap: wrap; gap: 7px; }
    .ep {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--surf); border: 1px solid var(--bdr);
      font-size: 1.15rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s;
    }
    .ep:active { transform: scale(.88); }
    .ep.on { border-color: var(--teal); background: rgba(0,229,176,.13); box-shadow: 0 0 10px rgba(0,229,176,.2); }

    .color-row { display: flex; flex-wrap: wrap; gap: 9px; }
    .cp { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform .12s; }
    .cp.on { border-color: #fff; transform: scale(1.18); }

    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-save {
      flex: 1;
      background: linear-gradient(115deg, var(--teal), #00b890);
      border: none; border-radius: 13px; color: #04130e;
      font-family: var(--fb); font-weight: 800; font-size: 1rem;
      padding: 15px; cursor: pointer; transition: transform .12s;
      box-shadow: 0 4px 18px rgba(0,229,176,.25);
    }
    .btn-save:active { transform: scale(.97); }
    .btn-cancel {
      background: transparent; border: 1px solid var(--bdr); border-radius: 13px;
      color: var(--muted); font-family: var(--fb); font-size: 1rem; font-weight: 600;
      padding: 15px 20px; cursor: pointer;
    }

    footer { text-align: center; padding: 12px 0 4px; font-size: .72rem; font-weight: 600; letter-spacing: .04em; }
    footer .brand {
      background: linear-gradient(115deg, var(--teal), var(--blue), var(--purple));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
    }
    footer .rest { color: var(--muted); opacity: .55; }
  </style>
</head>
<body>

<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<button class="theme-toggle" id="theme-toggle" title="Switch theme">🌙</button>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="drag-bar"></div>
    <h2 id="modal-title">New Activity</h2>
    <p class="modal-sub">Name your goal, pick an icon &amp; colour, then set your dates and times (GMT).</p>

    <div class="field">
      <label>Activity Name</label>
      <input type="text" id="inp-name" placeholder="e.g. Low Carb Days, Drink More Water…"/>
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="emoji-row" id="ep-row"></div>
    </div>
    <div class="field">
      <label>Colour</label>
      <div class="color-row" id="cp-row"></div>
    </div>
    <div class="field">
      <label>Start</label>
      <div class="field-row">
        <input type="date" id="inp-sd"/>
        <input type="time" id="inp-st"/>
      </div>
    </div>
    <div class="field">
      <label>End</label>
      <div class="field-row">
        <input type="date" id="inp-ed"/>
        <input type="time" id="inp-et"/>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save"   id="btn-save">Save Activity</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="header">
    <span class="logo-flame">🔥</span>
    <div class="logo">William's Fasting App</div>
    <div class="header-sub">Your goals · Your time · No limits</div>
  </div>

  <div class="add-wrap">
    <button class="btn-add" id="btn-open-modal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Activity
    </button>
  </div>

  <div id="content"></div>
  <footer><span class="brand">William Fasting App</span> <span class="rest">· Built for you.</span></footer>
</div>

<script>
var EMOJIS = ['🥑','💧','🏃','🍵','🧘','🥗','🔥','⚡','💪','🌿','🍎','🎯','🌙','☀️','🏋️','🧃'];
var COLORS = ['#00E5B0','#FFB347','#FF6B6B','#A78BFA','#5EB1FF','#F472B6','#4ADE80','#FBBF24','#F87171','#38BDF8','#FB923C','#E879F9'];
var KEY = 'wfa_v4';

/* Full ketosis & fat-burning stage guide */
var STAGES = [
  { h:0,   e:'🏁', name:'The Journey Begins', when:'Hour 0',
    desc:'Your body is running on glucose from your last meal. Insulin is elevated and fat burning is paused. <b>What to do:</b> hydrate well and keep carbs low so the switch can begin.' },
  { h:12,  e:'🌱', name:'Glycogen Depletion', when:'~12 hours in',
    desc:'Liver glycogen (stored sugar) is running low. Insulin drops and your body starts releasing fatty acids from fat stores. <b>You may feel:</b> slight hunger waves — they pass. Drink water with a pinch of salt.' },
  { h:24,  e:'🔥', name:'Fat Burning Switches On', when:'~24 hours in',
    desc:'Glycogen is nearly gone. Your liver begins converting fat into <b>ketones</b> — an alternative fuel for your brain and muscles. <b>You may feel:</b> a temporary energy dip ("keto flu"). Electrolytes (sodium, potassium, magnesium) fix most of it.' },
  { h:48,  e:'⚡', name:'Ketosis Begins', when:'~2 days in',
    desc:'Blood ketones reach 0.5–1.5 mmol/L — you are officially in <b>light ketosis</b>. Hunger hormones start to regulate and appetite drops. <b>You may notice:</b> fruity breath and clearer thinking.' },
  { h:72,  e:'🧠', name:'Deep Ketosis', when:'~3 days in',
    desc:'Ketones (1.5–3 mmol/L) are now your brain\'s main fuel. Most people report a "second wind" — steady energy with no crashes, sharper focus, and noticeably less hunger.' },
  { h:168, e:'🏆', name:'Fat Adapted', when:'~7 days in',
    desc:'Your metabolism has restructured to run efficiently on fat. Mitochondria multiply in muscle cells, endurance improves, and energy stays stable all day. This is the state athletes chase.' },
  { h:336, e:'✨', name:'Two-Week Milestone', when:'~14 days in',
    desc:'Insulin sensitivity is markedly improved and inflammation markers typically drop. Many people see significant weight loss, better sleep quality, and stable moods by this point.' },
  { h:720, e:'🌟', name:'Full Transformation', when:'~30 days in',
    desc:'Complete metabolic adaptation. Your body fluidly switches between fuels, cholesterol profiles often improve, and the low-carb lifestyle now feels natural rather than effortful. Incredible work.' }
];

var acts = [];
try { acts = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { acts = []; }

var editId = null, selEmoji = EMOJIS[0], selColor = COLORS[0], tickTimer = null;
var openStages = {};   /* remembers which stage accordions are open */

function persist() { try { localStorage.setItem(KEY, JSON.stringify(acts)); } catch(e) {} }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function pad2(n) { n = Math.max(0, Math.floor(n)); return n < 10 ? '0'+n : ''+n; }
function toTimestamp(d, t) { return new Date(d + 'T' + (t || '00:00')).getTime(); }
function fmtDate(s) {
  if (!s) return '—';
  return new Date(s + 'T00:00').toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}
function secsToParts(sec) {
  sec = Math.max(0, Math.floor(sec));
  return { d: Math.floor(sec/86400), h: Math.floor((sec%86400)/3600), m: Math.floor((sec%3600)/60), s: sec%60 };
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Day stats: GUARANTEED to tally. Done + Left = Total, always. ── */
function dayStats(startMs, endMs, now) {
  var DAY = 86400000;
  var totalDays = Math.max(1, Math.round((endMs - startMs) / DAY));
  var doneDays;
  if (now <= startMs)    doneDays = 0;
  else if (now >= endMs) doneDays = totalDays;
  else                   doneDays = Math.min(totalDays, Math.floor((now - startMs) / DAY));
  return { total: totalDays, done: doneDays, left: totalDays - doneDays };
}

/* ── Which ketosis stage is active right now ── */
function currentStage(elapsedH) {
  var idx = 0;
  for (var i = 0; i < STAGES.length; i++) { if (elapsedH >= STAGES[i].h) idx = i; }
  return idx;
}

/* ───── MODAL ───── */
function buildPickers() {
  var epRow = document.getElementById('ep-row');
  var cpRow = document.getElementById('cp-row');
  epRow.innerHTML = ''; cpRow.innerHTML = '';
  EMOJIS.forEach(function(e) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'ep' + (e === selEmoji ? ' on' : '');
    b.textContent = e;
    b.addEventListener('click', function() {
      selEmoji = e;
      epRow.querySelectorAll('.ep').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
    });
    epRow.appendChild(b);
  });
  COLORS.forEach(function(c) {
    var d = document.createElement('div');
    d.className = 'cp' + (c === selColor ? ' on' : '');
    d.style.background = c;
    d.addEventListener('click', function() {
      selColor = c;
      cpRow.querySelectorAll('.cp').forEach(function(x){ x.classList.remove('on'); });
      d.classList.add('on');
    });
    cpRow.appendChild(d);
  });
}

function openModal(id) {
  editId = id || null;
  selEmoji = EMOJIS[0]; selColor = COLORS[0];
  if (editId) {
    var a = null;
    for (var i = 0; i < acts.length; i++) { if (acts[i].id === editId) { a = acts[i]; break; } }
    if (a) {
      document.getElementById('modal-title').textContent = 'Edit Activity';
      document.getElementById('inp-name').value = a.name;
      document.getElementById('inp-sd').value = a.sd;
      document.getElementById('inp-st').value = a.st || '00:00';
      document.getElementById('inp-ed').value = a.ed;
      document.getElementById('inp-et').value = a.et || '23:59';
      selEmoji = a.emoji || EMOJIS[0];
      selColor = a.color || COLORS[0];
    }
  } else {
    document.getElementById('modal-title').textContent = 'New Activity';
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-sd').value = todayStr();
    document.getElementById('inp-st').value = '00:00';
    document.getElementById('inp-ed').value = '';
    document.getElementById('inp-et').value = '23:59';
  }
  buildPickers();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function saveActivity() {
  var name = document.getElementById('inp-name').value.trim();
  var sd = document.getElementById('inp-sd').value;
  var st = document.getElementById('inp-st').value || '00:00';
  var ed = document.getElementById('inp-ed').value;
  var et = document.getElementById('inp-et').value || '23:59';
  if (!name) { alert('Please enter an activity name.'); return; }
  if (!sd)   { alert('Please set a start date.'); return; }
  if (!ed)   { alert('Please set an end date.'); return; }
  var startMs = toTimestamp(sd, st), endMs = toTimestamp(ed, et);
  if (isNaN(startMs) || isNaN(endMs)) { alert('Invalid date or time.'); return; }
  if (endMs <= startMs) { alert('End date/time must be after start date/time.'); return; }

  if (editId) {
    for (var i = 0; i < acts.length; i++) {
      if (acts[i].id === editId) {
        acts[i].name = name; acts[i].sd = sd; acts[i].st = st;
        acts[i].ed = ed; acts[i].et = et;
        acts[i].emoji = selEmoji; acts[i].color = selColor;
        break;
      }
    }
  } else {
    acts.push({ id: uid(), name: name, sd: sd, st: st, ed: ed, et: et, emoji: selEmoji, color: selColor });
  }
  persist(); closeModal(); renderAll(); startTick();
}

function deleteActivity(id) {
  if (!confirm('Remove this activity?')) return;
  acts = acts.filter(function(a){ return a.id !== id; });
  persist(); renderAll(); startTick();
}

/* ───── HAPTICS (feels native on Android) ───── */
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms || 12); } catch(e) {} }

/* ───── CONFETTI on completed journeys (once per session) ───── */
var confettiShown = {};
var CONF_COLORS = ['#FF6B6B','#FFB347','#FFE066','#4ADE80','#00E5B0','#5EB1FF','#A78BFA','#F472B6'];
function celebrate(actId) {
  if (confettiShown[actId]) return;
  confettiShown[actId] = true;
  var card = document.getElementById('card-' + actId);
  if (!card) return;
  for (var i = 0; i < 28; i++) {
    var p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = (Math.random() * 96 + 2) + '%';
    p.style.background = CONF_COLORS[i % CONF_COLORS.length];
    p.style.setProperty('--dur', (2 + Math.random() * 1.6) + 's');
    p.style.setProperty('--delay', (Math.random() * 0.9) + 's');
    p.style.width = (6 + Math.random() * 5) + 'px';
    card.appendChild(p);
    (function(piece){ setTimeout(function(){ if (piece.parentNode) piece.parentNode.removeChild(piece); }, 4600); })(p);
  }
  buzz([30, 40, 30]);
}

/* ───── STAGE CAROUSEL ENGINE ───── */
var AUTO_MS = 12000;                /* each stage shows for 12 seconds — comfortable reading pace */
var carState = {};                  /* per-activity: { idx, timer } */

function carSetup(actId, startIdx) {
  carState[actId] = carState[actId] || { idx: startIdx, timer: null };
  carState[actId].idx = (typeof carState[actId].idx === 'number') ? carState[actId].idx : startIdx;
  carRender(actId);
  carAutoplay(actId);
  carSwipe(actId);
}

function carRender(actId) {
  var st = carState[actId]; if (!st) return;
  var track = document.getElementById('cartrack-' + actId);
  var dotsEl = document.getElementById('cardots-' + actId);
  if (!track || !dotsEl) return;
  track.style.transform = 'translateX(-' + (st.idx * 100) + '%)';
  var dots = dotsEl.children;
  for (var i = 0; i < dots.length; i++) dots[i].classList.toggle('on', i === st.idx);
}

function carAutoplay(actId) {
  var st = carState[actId]; if (!st) return;
  if (st.timer) clearInterval(st.timer);
  carProgressBar(actId);
  st.timer = setInterval(function() {
    st.idx = (st.idx + 1) % STAGES.length;
    carRender(actId);
    carProgressBar(actId);
  }, AUTO_MS);
}

function carProgressBar(actId) {
  var bar = document.getElementById('carprog-' + actId);
  if (!bar) return;
  bar.classList.remove('animating');
  void bar.offsetWidth;             /* restart the CSS animation */
  bar.style.animationDuration = AUTO_MS + 'ms';
  bar.classList.add('animating');
}

function carStep(actId, dir) {
  buzz(8);
  var st = carState[actId]; if (!st) return;
  st.idx = (st.idx + dir + STAGES.length) % STAGES.length;
  carRender(actId);
  carAutoplay(actId);               /* user interaction resets the auto-timer */
}

function carGoto(actId, idx) {
  var st = carState[actId]; if (!st) return;
  st.idx = idx;
  carRender(actId);
  carAutoplay(actId);
}

function carSwipe(actId) {
  var el = document.getElementById('car-' + actId);
  if (!el || el._swipeBound) return;
  el._swipeBound = true;
  var x0 = null;
  el.addEventListener('touchstart', function(e){ x0 = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', function(e){
    if (x0 === null) return;
    var dx = e.changedTouches[0].clientX - x0;
    if (Math.abs(dx) > 40) carStep(actId, dx < 0 ? 1 : -1);
    x0 = null;
  }, {passive:true});
}

/* ───── RENDER ───── */

  if (!acts.length) {
    el.innerHTML =
      '<div class="empty">' +
        '<div class="empty-icon">🔥</div>' +
        '<h2>Start Your Transformation</h2>' +
        '<p>Track <strong>any goal</strong> — low-carb days, fasting windows, water intake — with live timers, ketosis science and zero limits on duration.</p>' +
        '<div class="feature-grid">' +
          '<div class="feat" style="background:linear-gradient(135deg,rgba(0,229,176,.12),rgba(0,229,176,.03));border-color:rgba(0,229,176,.35)">' +
            '<div class="feat-icon">⏱️</div><div class="feat-t" style="color:var(--teal)">Live Timer</div>' +
            '<div class="feat-d">Watch every second of progress tick by — days, hours, minutes, seconds.</div></div>' +
          '<div class="feat" style="background:linear-gradient(135deg,rgba(255,179,71,.12),rgba(255,179,71,.03));border-color:rgba(255,179,71,.35)">' +
            '<div class="feat-icon">🧠</div><div class="feat-t" style="color:var(--amber)">Ketosis Guide</div>' +
            '<div class="feat-d">See exactly what\'s happening in your body at every stage of fat burning.</div></div>' +
          '<div class="feat" style="background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(167,139,250,.03));border-color:rgba(167,139,250,.35)">' +
            '<div class="feat-icon">🎨</div><div class="feat-t" style="color:var(--purple)">Make It Yours</div>' +
            '<div class="feat-d">Custom names, icons and colours for every goal. Edit anytime.</div></div>' +
          '<div class="feat" style="background:linear-gradient(135deg,rgba(244,114,182,.12),rgba(244,114,182,.03));border-color:rgba(244,114,182,.35)">' +
            '<div class="feat-icon">🎉</div><div class="feat-t" style="color:var(--pink)">Celebrate Wins</div>' +
            '<div class="feat-d">Confetti rains down when you complete a journey. You earned it.</div></div>' +
        '</div>' +
      '</div>';
    return;
  }
  var now = Date.now();
  var html = '<div class="list">';
  for (var i = 0; i < acts.length; i++) html += buildCard(acts[i], now);
  html += '</div>';
  el.innerHTML = html;
  tick(); /* fill digits immediately — no 00 flash */

  /* boot each card's stage carousel on its current stage + celebrate completions */
  for (var j = 0; j < acts.length; j++) {
    var b = acts[j];
    var sMs = toTimestamp(b.sd, b.st);
    var eMs = toTimestamp(b.ed, b.et);
    var eh = (now - sMs) / 3600000;
    var startIdx = (now < sMs) ? 0 : currentStage(Math.max(0, eh));
    carSetup(b.id, startIdx);
    if (now >= eMs) celebrate(b.id);
  }
}

function buildCard(a, now) {
  var startMs = toTimestamp(a.sd, a.st);
  var endMs   = toTimestamp(a.ed, a.et);
  var done       = now >= endMs;
  var notStarted = now < startMs;
  var pct = notStarted ? 0 : done ? 100 : Math.min(99, Math.max(0, Math.round((now - startMs) / (endMs - startMs) * 100)));
  var elapsedH = (now - startMs) / 3600000;
  var ds = dayStats(startMs, endMs, now);
  var color = a.color || '#00E5B0';
  var name = esc(a.name);

  /* Phase badge */
  var stIdx = currentStage(Math.max(0, elapsedH));
  var phase, pBg;
  if (notStarted)  { phase = 'Not Started Yet'; pBg = 'rgba(124,137,171,.14)'; }
  else if (done)   { phase = '✓ Complete!';      pBg = color + '26'; }
  else             { phase = STAGES[stIdx].e + ' ' + STAGES[stIdx].name; pBg = color + '22'; }

  /* Ring geometry */
  var R = 38, CIRC = 2 * Math.PI * R;
  var off = CIRC - (pct / 100) * CIRC;

  /* Ring markup (lives inside the stage hero) */
  var ringHtml =
    '<div class="ring-wrap">' +
      '<svg class="ring-svg" viewBox="0 0 92 92">' +
        '<defs><linearGradient id="rg-' + a.id + '" x1="0%" y1="0%" x2="100%" y2="100%">' +
          '<stop offset="0%" stop-color="' + color + '"/><stop offset="100%" stop-color="' + color + '99"/>' +
        '</linearGradient></defs>' +
        '<circle class="ring-track" cx="46" cy="46" r="' + R + '"/>' +
        '<circle class="ring-prog" cx="46" cy="46" r="' + R + '" stroke="url(#rg-' + a.id + ')" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + off + '" id="ring-' + a.id + '"/>' +
      '</svg>' +
      '<div class="ring-mid">' +
        '<div class="ring-pct" style="color:' + color + '" id="pct-' + a.id + '">' + pct + '%</div>' +
        '<div class="ring-cap">Done</div>' +
      '</div>' +
    '</div>';

  /* BIG BOLD current stage hero */
  var stagePanel = '';
  if (!notStarted && !done) {
    var cs = STAGES[stIdx];
    var nxt = STAGES[stIdx + 1];
    var nextLine = '';
    if (nxt) {
      var np = secsToParts((nxt.h - elapsedH) * 3600);
      nextLine = '<div class="stage-hero-next">Next: <b>' + nxt.e + ' ' + nxt.name + '</b> in ' +
        (np.d > 0 ? np.d + 'd ' : '') + np.h + 'h ' + np.m + 'm</div>';
    } else {
      nextLine = '<div class="stage-hero-next"><b>Final stage reached! 🎉</b></div>';
    }
    stagePanel =
      '<div class="stage-hero" style="background:linear-gradient(135deg,' + color + '16,' + color + '05);border-color:' + color + '55">' +
        ringHtml +
        '<div class="stage-hero-meta">' +
          '<div class="stage-hero-kicker" style="color:' + color + '">Current Stage · ' + (stIdx+1) + ' of ' + STAGES.length + '</div>' +
          '<div class="stage-hero-name">' + cs.e + ' ' + cs.name + '</div>' +
          nextLine +
        '</div>' +
      '</div>';
  } else if (done) {
    stagePanel =
      '<div class="stage-hero" style="background:linear-gradient(135deg,' + color + '18,' + color + '06);border-color:' + color + '66">' +
        ringHtml +
        '<div class="stage-hero-meta">' +
          '<div class="stage-hero-kicker" style="color:' + color + '">Journey Complete</div>' +
          '<div class="stage-hero-name">🎉 Goal Achieved!</div>' +
          '<div class="stage-hero-next">Edit the dates to extend, or start a new activity.</div>' +
        '</div>' +
      '</div>';
  } else {
    stagePanel =
      '<div class="stage-hero" style="background:linear-gradient(135deg,' + color + '10,' + color + '04);border-color:' + color + '40">' +
        ringHtml +
        '<div class="stage-hero-meta">' +
          '<div class="stage-hero-kicker" style="color:' + color + '">Coming Up</div>' +
          '<div class="stage-hero-name">⏳ Not Started Yet</div>' +
          '<div class="stage-hero-next">Your journey begins on <b>' + fmtDate(a.sd) + '</b></div>' +
        '</div>' +
      '</div>';
  }

  /* Auto-playing stage carousel — the "moving picture" */
  var slides = '', dots = '';
  for (var i = 0; i < STAGES.length; i++) {
    var s = STAGES[i];
    var hit = !notStarted && elapsedH >= s.h;
    var isNow = !notStarted && !done && i === stIdx;
    slides +=
      '<div class="car-slide' + (hit ? ' hit' : '') + (isNow ? ' now' : '') + '">' +
        '<div class="car-head">' +
          '<div class="car-dot-icon">' + s.e + '</div>' +
          '<div class="car-meta">' +
            '<div class="car-name">' + s.name +
              (isNow ? '<span class="tag tag-now">Now</span>' : hit ? '<span class="tag tag-hit">✓ Reached</span>' : '') +
            '</div>' +
            '<div class="car-when">' + s.when + ' · Stage ' + (i+1) + ' of ' + STAGES.length + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="car-desc">' + s.desc + '</div>' +
      '</div>';
    dots += '<div class="car-dot' + (hit ? ' passed' : '') + '" onclick="carGoto(\'' + a.id + '\',' + i + ')"></div>';
  }

  var journey =
    '<div class="journey">' +
      '<div class="journey-title"><span>Fat-Burning &amp; Ketosis Journey</span><span class="journey-hint">auto-plays · swipe or tap dots</span></div>' +
      '<div class="carousel" id="car-' + a.id + '">' +
        '<div class="car-track" id="cartrack-' + a.id + '">' + slides + '</div>' +
        '<div class="car-nav">' +
          '<button class="car-arrow prev" onclick="carStep(\'' + a.id + '\',-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"/></svg></button>' +
          '<span style="display:flex;align-items:center;gap:7px;" id="cardots-' + a.id + '">' + dots + '</span>' +
          '<button class="car-arrow next" onclick="carStep(\'' + a.id + '\',1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg></button>' +
        '</div>' +
        '<div class="car-progress" id="carprog-' + a.id + '"></div>' +
      '</div>' +
    '</div>';

  var timerLbl = done ? '✓ Total Duration'
    : notStarted ? '⏳ Starts In'
    : '<span class="pulse" style="background:' + color + ';color:' + color + '"></span>Live Timer';
  var timerSub = done ? 'Journey complete 🎉' : notStarted ? 'until your journey begins' : 'elapsed since your start';

  return '' +
  '<div class="card" id="card-' + a.id + '">' +
    '<div class="card-accent" style="background:linear-gradient(90deg,' + color + ',#FFB347,#A78BFA,' + color + ')"></div>' +
    '<div class="card-top">' +
      '<div class="card-left">' +
        '<div class="card-emoji">' + (a.emoji || '🎯') + '</div>' +
        '<div>' +
          '<div class="card-name">' + name + '</div>' +
          '<div class="card-badge" style="background:' + pBg + ';color:' + color + '">' +
            '<span class="bdot" style="background:' + color + '"></span>' + phase +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-btns">' +
        '<button class="ibtn" onclick="openModal(\'' + a.id + '\')" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
        '<button class="ibtn" onclick="deleteActivity(\'' + a.id + '\')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>' +
      '</div>' +
    '</div>' +

    '<div class="timer-wrap">' +
      '<div class="lights"><span class="light"></span><span class="light"></span><span class="light"></span><span class="light"></span><span class="light"></span><span class="light"></span><span class="light"></span><span class="light"></span></div>' +
      '<div class="timer-lbl">' + timerLbl + '</div>' +
      '<div class="timer-digits">' +
        '<div class="td"><div class="td-num" id="td-d-' + a.id + '" style="color:' + color + '">00</div><div class="td-lbl">Days</div></div>' +
        '<div class="td-sep">:</div>' +
        '<div class="td"><div class="td-num" id="td-h-' + a.id + '" style="color:' + color + '">00</div><div class="td-lbl">Hrs</div></div>' +
        '<div class="td-sep">:</div>' +
        '<div class="td"><div class="td-num" id="td-m-' + a.id + '" style="color:' + color + '">00</div><div class="td-lbl">Min</div></div>' +
        '<div class="td-sep">:</div>' +
        '<div class="td"><div class="td-num" id="td-s-' + a.id + '" style="color:' + color + '">00</div><div class="td-lbl">Sec</div></div>' +
      '</div>' +
      '<div class="timer-sub">' + timerSub + '</div>' +
    '</div>' +

    stagePanel +

    '<div class="dates-row">' +
      '<div class="dt-box s"><div class="dt-lbl">Start</div><div class="dt-date">' + fmtDate(a.sd) + '</div><div class="dt-time" style="color:var(--teal)">' + (a.st || '00:00') + ' GMT</div></div>' +
      '<div class="dt-box e"><div class="dt-lbl">End</div><div class="dt-date">' + fmtDate(a.ed) + '</div><div class="dt-time" style="color:var(--coral)">' + (a.et || '23:59') + ' GMT</div></div>' +
    '</div>' +

    '<div class="stats-strip">' +
      '<div class="ss-item"><div class="ss-val" style="color:' + color + '">' + ds.total + '</div><div class="ss-lbl">Total Days</div></div>' +
      '<div class="ss-div"></div>' +
      '<div class="ss-item"><div class="ss-val" style="color:var(--amber)" id="dd-' + a.id + '">' + ds.done + '</div><div class="ss-lbl">Days Done</div></div>' +
      '<div class="ss-div"></div>' +
      '<div class="ss-item"><div class="ss-val" style="color:var(--coral)" id="dl-' + a.id + '">' + ds.left + '</div><div class="ss-lbl">Days Left</div></div>' +
    '</div>' +

    journey +
  '</div>';
}

/* ───── TICK — keeps timer, %, ring AND day stats perfectly in sync ───── */
function tick() {
  var now = Date.now();
  var needsFullRender = false;

  for (var i = 0; i < acts.length; i++) {
    var a = acts[i];
    var dEl = document.getElementById('td-d-' + a.id);
    if (!dEl) continue;

    var startMs = toTimestamp(a.sd, a.st);
    var endMs   = toTimestamp(a.ed, a.et);
    var done = now >= endMs, notStarted = now < startMs;

    var secs;
    if (done)            secs = (endMs - startMs) / 1000;
    else if (notStarted) secs = (startMs - now) / 1000;
    else                 secs = (now - startMs) / 1000;

    var p = secsToParts(secs);
    dEl.textContent = pad2(p.d);
    document.getElementById('td-h-' + a.id).textContent = pad2(p.h);
    document.getElementById('td-m-' + a.id).textContent = pad2(p.m);
    document.getElementById('td-s-' + a.id).textContent = pad2(p.s);

    /* keep % + ring live */
    var pct = notStarted ? 0 : done ? 100 : Math.min(99, Math.max(0, Math.round((now - startMs) / (endMs - startMs) * 100)));
    var pctEl = document.getElementById('pct-' + a.id);
    if (pctEl && pctEl.textContent !== pct + '%') {
      pctEl.textContent = pct + '%';
      var ring = document.getElementById('ring-' + a.id);
      if (ring) {
        var R = 38, CIRC = 2 * Math.PI * R;
        ring.setAttribute('stroke-dashoffset', CIRC - (pct / 100) * CIRC);
      }
    }

    /* keep day stats live & consistent (Done + Left = Total) */
    var ds = dayStats(startMs, endMs, now);
    var ddEl = document.getElementById('dd-' + a.id);
    var dlEl = document.getElementById('dl-' + a.id);
    if (ddEl && dlEl && ddEl.textContent !== String(ds.done)) {
      ddEl.textContent = ds.done;
      dlEl.textContent = ds.left;
      needsFullRender = true; /* day boundary or start/end crossed — refresh phase & stages too */
    }
  }
  if (needsFullRender) renderAll();
}

function startTick() {
  if (tickTimer) clearInterval(tickTimer);
  tick();
  tickTimer = setInterval(tick, 1000);
}

/* ───── THEME ───── */
var THEME_KEY = 'wfa_theme';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  var btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = (t === 'light') ? '🌙' : '☀️';
  try { localStorage.setItem(THEME_KEY, t); } catch(e) {}
}
(function initTheme() {
  var saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch(e) {}
  applyTheme(saved === 'light' ? 'light' : 'dark');
})();
document.getElementById('theme-toggle').addEventListener('click', function() {
  buzz();
  var cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'light' ? 'dark' : 'light');
});

/* ───── WIRE UP ───── */
document.getElementById('btn-open-modal').addEventListener('click', function(){ buzz(); openModal(null); });
document.getElementById('btn-cancel').addEventListener('click', function(){ buzz(); closeModal(); });
document.getElementById('btn-save').addEventListener('click', function(){ buzz(); saveActivity(); });
document.getElementById('overlay').addEventListener('click', function(e){
  if (e.target === document.getElementById('overlay')) closeModal();
});

renderAll();
startTick();
</script>
</body>
